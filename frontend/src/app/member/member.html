<app-side-bar></app-side-bar>
<div class="members-shell">

  <!-- Topbar -->
  <div class="members-topbar">
    <div class="topbar-left">
      <div class="search-wrap">
        <span class="material-symbols-outlined search-icon">search</span>
        <input class="search-input" type="text" placeholder="Search members..." />
      </div>
    </div>

    <div class="topbar-right">
      <button class="topbar-icon-btn">
        <span class="material-symbols-outlined">notifications</span>
      </button>

      <div class="topbar-user">
        <span class="user-name">Admin</span>
        <img src="https://i.pravatar.cc/40" class="user-avatar" />
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="members-content">

    <!-- Header -->
    <div class="page-header">
      <h2>Members Management</h2>
      <div>
        <button class="btn-secondary">Export</button>
        <button class="btn-primary">Email</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <select>
        <option>All Status</option>
        <option>Active</option>
        <option>Expired</option>
      </select>

      <select>
        <option>All Plans</option>
        <option>Elite</option>
        <option>Monthly</option>
      </select>

      <button>Apply</button>
    </div>

    <!-- Table -->
    <div class="table-card">
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Plan</th>
            <th>Join Date</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>
              <div class="member-cell">
                <div class="member-avatar">AC</div>
                <div>
                  <div>Alex Chen</div>
                  <small>alex@mail.com</small>
                </div>
              </div>
            </td>
            <td><span class="badge">Active</span></td>
            <td>Elite Annual</td>
            <td>2024-01-10</td>
            <td>
              <button>↻</button>
              <button>↑</button>
              <button>⋮</button>
            </td>
          </tr>

          <tr>
            <td>
              <div class="member-cell">
                <div class="member-avatar">JD</div>
                <div>
                  <div>John Doe</div>
                  <small>john@mail.com</small>
                </div>
              </div>
            </td>
            <td><span class="badge">Expired</span></td>
            <td>Monthly</td>
            <td>2023-11-02</td>
            <td>
              <button>↻</button>
              <button>↑</button>
              <button>⋮</button>
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>
</div>
