<h2 class="section-title">Coach Statistics</h2>
<div class="stats-grid coach-stats">
  <div class="stat-card">
    <div class="stat-label">Active Coaches</div>
    <div class="stat-value">{{coachStats.activeCoaches}}</div>
    <div class="stat-change">
      <span class="material-symbols-outlined">bolt</span>
      <span>Currently working</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Total Courses</div>
    <div class="stat-value">{{coachStats.totalCourses}}</div>
    
  </div>

  <div class="stat-card">
    <div class="stat-label">Inactive Coaches</div>
    <div class="stat-value">{{coachStats.inactive}}</div>
    <div class="stat-change">
      <span class="material-symbols-outlined">pause_circle</span>
      <span>On break / paused</span>
    </div>
  </div>

  <div class="stat-card featured">
    <div class="stat-label">Avg Rating</div>
    <div class="stat-value">{{coachStats.averageRating}}</div>
    <div class="stat-change">
      <span class="material-symbols-outlined">star</span>
      <span>Based on member reviews</span>
    </div>
  </div>

</div>
