<h2 class="section-title">Plan & Machines Statistics</h2>
<div class="plans-card">

  <!-- ===== PLANS ===== -->
  <div class="plans-header">
    <div>
      <div class="plans-title">Plans Distribution</div>
      <div class="plans-subtitle">Member plan breakdown</div>
    </div>
  </div>

  <div class="plans-body">

    <div class="donut-wrapper">
      <svg viewBox="0 0 120 120" class="donut">
        <circle cx="60" cy="60" r="45" class="donut-bg"></circle>

        <circle
          *ngFor="let plan of plans; let i = index"
          cx="60" cy="60" r="45"
          class="donut-segment"
          [class]="'segment-' + i"
          [attr.stroke-dasharray]="getArc(plan.count, plansTotal)"
          [attr.stroke-dashoffset]="getOffset(i)"
        ></circle>
      </svg>

      <div class="donut-center">
        <div class="donut-total">{{ plansTotal }}</div>
        <div class="donut-label">Total</div>
      </div>
    </div>

    <div class="plans-legend">
      <div class="legend-row" *ngFor="let plan of plans; let i = index">
        <span class="dot" [class]="'segment-' + i"></span>
        <span class="name">{{ plan.type }}</span>
        <span class="value">{{ plan.count }}</span>
      </div>
    </div>

  </div>

  <!-- ===== MACHINES ===== -->
  <div class="plans-header">
    <div>
      <div class="plans-title">Machines Distribution</div>
      <div class="plans-subtitle">Fitness equipment breakdown</div>
    </div>
  </div>

  <div class="plans-body">

    <div class="donut-wrapper">
      <svg viewBox="0 0 120 120" class="donut">
        <circle cx="60" cy="60" r="45" class="donut-bg"></circle>

        <circle
          *ngFor="let machine of machines; let i = index"
          cx="60" cy="60" r="45"
          class="donut-segment"
          [class]="'segment-' + i"
          [attr.stroke-dasharray]="getMachineArc(machine.count)"
          [attr.stroke-dashoffset]="getMachineOffset(i)"
        ></circle>
      </svg>

      <div class="donut-center">
        <div class="donut-total">{{ machinesTotal }}</div>
        <div class="donut-label">Total</div>
      </div>
    </div>

    <div class="plans-legend">
      <div class="legend-row" *ngFor="let machine of machines; let i = index">
        <span class="dot" [class]="'segment-' + i"></span>
        <span class="name">{{ machine.type }} </span>
        <span class="value">{{ machine.count }}</span>
      </div>
    </div>

  </div>
</div>
