<aside class="sidebar-column">
  <div class="profile-preview-card">
    <div class="preview-header">
      <img src="https://i.pravatar.cc/150?u=ac" class="preview-avatar">
      <h3>{{ member?.fitapi_user?.first_name || 'Alex' }} {{ member?.fitapi_user?.last_name || 'Chen' }}</h3>
      <span class="badge badge--active">Active Member</span>
    </div>
    
    <div class="preview-body">
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value">{{ member?.fitapi_user?.email || 'N/A' }}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Join Date</span>
        <span class="info-value">{{ member?.fitapi_user?.created_at || 'Today' }}</span>
      </div>
      
      <button class="btn-primary" (click)="closeProfile()">
        Close
      </button>
    </div>
  </div>
</aside>
