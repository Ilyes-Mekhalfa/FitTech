<aside class="panel sidebar-column" [class.open]="coach">

  <div class="profile-preview-card">

    <ng-container *ngIf="coach">

      <div class="mode-toggle-tabs">
        <button
          class="tab-btn"
          [class.active]="!editMode"
          (click)="editMode = false">
          View
        </button>
        <button
          class="tab-btn"
          [class.active]="editMode"
          (click)="toggleEditMode()">
          Edit
        </button>
      </div>

      <ng-container *ngIf="!editMode">

        <div class="profile-preview-card__view">
          
          <div class="preview-header-centered section">
            <div class="preview-avatar-circle">
              <img *ngIf="coach.fitapi_user?.profile_picture" [src]="coach.fitapi_user.profile_picture" alt="Avatar">
              <span *ngIf="!coach.fitapi_user?.profile_picture">
                {{ coach.fitapi_user?.first_name?.charAt(0) || 'C' }}
              </span>
            </div>

            <h2 class="profile-name">
              {{ coach.fitapi_user?.first_name }} {{ coach.fitapi_user?.last_name }}
            </h2>

            <span class="badge badge--inactive">
              Inactive Member
            </span>
          </div>

          <div class="preview-body section">
            <div class="info-row">
              <span class="info-label">Email</span>
              <span class="info-value text-bold">{{ coach.fitapi_user?.email }}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Subscription Status</span>
              <span class="info-value text-bold">N/A</span>
            </div>
            <div class="info-row">
              <span class="info-label">Subscription End Date</span>
              <span class="info-value text-bold">N/A</span>
            </div>
          </div>

          <div class="footer-actions">
            <button class="btn btn--close" (click)="closeProfile()">
              Close
            </button>
          </div>
        </div>

      </ng-container>

      <ng-container *ngIf="editMode">
        <form class="edit-container section" [formGroup]="editFormData">
          <div class="edit-section">
            <div class="edit-header">
              <h4>Edit Coach Profile</h4>
            </div>

            <div class="edit-form">
              <div class="form-group">
                <label class="form-label">First Name</label>
                <input type="text" class="form-input" formControlName="first_name">
              </div>

              <div class="form-group">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-input" formControlName="last_name">
              </div>

              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" formControlName="email">
              </div>

              <div class="form-group">
                <label class="form-label">Specialties</label>
                <input type="text" class="form-input" formControlName="specialty">
              </div>

              <div class="form-group">
                <label class="form-label">Biography</label>
                <textarea rows="4" class="form-input form-textarea" formControlName="biography"></textarea>
              </div>

              <div class="form-actions">
                <button type="button" class="btn btn--primary" (click)="saveProfile()">
                  Save Profile
                </button>
                <button type="button" class="btn btn--secondary" (click)="editMode = false">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </form>
      </ng-container>

    </ng-container>

  </div>

</aside>
