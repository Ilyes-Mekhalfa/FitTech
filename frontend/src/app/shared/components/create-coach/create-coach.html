<form [formGroup]="createCoachForm" (ngSubmit)="submit()" class="page">

<!-- LEFT -->
<div class="left">

<!-- Account -->
<section class="card">
  <h3>Account</h3>

  <div class="grid">
    <input formControlName="first_name" placeholder="First name"/>
    <input formControlName="last_name" placeholder="Last name"/>
    <input formControlName="email" placeholder="Email"/>
    <input formControlName="phone" placeholder="Phone"/>
    
    <div class="pw">
      <input [type]="showPw ? 'text':'password'" formControlName="password" placeholder="Password"/>
      <button type="button" (click)="showPw=!showPw">👁</button>
    </div>

    <div class="pw">
      <input [type]="showCpw ? 'text':'password'" formControlName="confirm_pw" placeholder="Confirm"/>
      <button type="button" (click)="showCpw=!showCpw">👁</button>
    </div>
  </div>
</section>

<!-- Profile -->
<section class="card">

  <!-- Specialties -->
  <div class="tags">
    <span *ngFor="let s of specialties">
      {{s}} <button (click)="removeSpec(s)">×</button>
    </span>

    <input
      [(ngModel)]="specInput"
      (keydown.enter)="addSpec()"
      (keydown)="onSpecKey($event)"
      placeholder="Add specialty"/>
  </div>

  <!-- Experience -->
  <div class="exp">
    <button (click)="exp=exp-1">−</button>
    <b>{{exp}}</b>
    <button (click)="exp=exp+1">+</button>
  </div>

  <textarea formControlName="biography" placeholder="Bio"></textarea>
</section>

</div>

<!-- RIGHT -->
<div class="right">

<!-- Preview -->
<div class="preview">
  <div class="avatar">
    {{initials || '👤'}}
  </div>

  <h4>{{form.value.first_name || 'New'}} {{form.value.last_name}}</h4>
  <p>{{form.value.email || 'coach@email.com'}}</p>
</div>

<!-- Payload -->
<pre>{{payload | json}}</pre>

<!-- Progress -->
<div>
  <div>progress %</div>
  <div class="bar">
    <div [style.width.%]="progress"></div>
  </div>
</div>

</div>

</form>
