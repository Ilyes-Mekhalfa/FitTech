<aside class="live-panel">
  <div class="live-header">
    <h3>Live Entrance</h3>
    <span class="live-status">● Live</span>
  </div>

  <div class="live-list">
    <div class="live-item" *ngFor="let member of liveMembers">
      <div class="live-avatar">
        {{ member.initials }}
      </div>

      <div class="live-info">
        <div class="live-name">{{ member.name }}</div>
        <div class="live-time">{{ member.time }}</div>
      </div>

      <span class="material-symbols-outlined live-icon">
        login
      </span>
    </div>
  </div>
</aside>
