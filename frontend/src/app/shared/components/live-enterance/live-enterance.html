<aside class="live-panel">
  <div class="live-header">
    <h3>Live Entrance</h3>
    <span class="live-status">● Live</span>
  </div>

  <div class="live-list">
    <div class="live-item" >
      <div class="live-avatar">
       member.initials 
      </div>

      <div class="live-info" *ngFor="let member of users">
        <div class="live-name"> {{member.fullName}}</div>
        <div class="live-time"> {{member.enteredAt}} </div>
      </div>

      <span class="material-symbols-outlined live-icon">
        login
      </span>
    </div>
  </div>
</aside>
