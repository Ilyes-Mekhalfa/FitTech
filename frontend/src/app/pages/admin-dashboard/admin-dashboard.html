<div class="dashboard-shell">
  <header class="dashboard-topbar">
    <div class="topbar-left">
      <h2 class="topbar-title">Management Dashboard</h2>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <span class="user-name">Admin</span>
        <img src="https://i.pravatar.cc/40" class="user-avatar" />
      </div>
    </div>
  </header>

  <main class="dashboard-content">
    <div class="dashboard-grid">
      
      <aside class="live-feed-column">
        <div class="feed-header">
          <span class="material-symbols-outlined icon-live">sensors</span>
          <h3>Live Check-in</h3>
          <span class="live-pulse"></span>
        </div>

        <div class="feed-container">
          <div class="scan-card" [class.access-denied]="member.status === 'Expired'">
            <div class="scan-photo-wrap">
              <img src="https://i.pravatar.cc/100?u=alex" class="scan-photo">
              <div class="status-indicator"></div>
            </div>
            <div class="scan-details">
              <p class="scan-time">Just now</p>
              <h4 class="scan-name">Alex Chen</h4>
              <span class="scan-badge">Titanium Elite</span>
              <div class="scan-meta">
                <span><span class="material-symbols-outlined">event</span> Exp: Dec 2024</span>
              </div>
            </div>
          </div>

          <div class="scan-card-mini">
            <img src="https://i.pravatar.cc/50?u=sarah" class="mini-photo">
            <div class="mini-details">
              <p class="mini-name">Sarah Jenkins</p>
              <p class="mini-time">2 mins ago • Monthly Plan</p>
            </div>
          </div>

          <div class="scan-card-mini access-denied">
            <img src="https://i.pravatar.cc/50?u=mike" class="mini-photo">
            <div class="mini-details">
              <p class="mini-name">Mike Ross</p>
              <p class="mini-time">10 mins ago • <span class="error-text">Expired</span></p>
            </div>
          </div>
        </div>
      </aside>

      <div class="main-stats-column">
        <div class="stats-row">
          <div class="stat-box">
            <label>Current Capacity</label>
            <div class="stat-value">84 <small>/ 150</small></div>
            <div class="stat-progress"><div class="progress-fill" style="width: 56%"></div></div>
          </div>
          <div class="stat-box">
            <label>Daily Revenue</label>
            <div class="stat-value">$1,240</div>
            <p class="stat-trend">+8% vs yesterday</p>
          </div>
        </div>

        <div class="chart-card">
          <div class="card-header">
            <h4>Check-in Trends (Weekly)</h4>
          </div>
          <div class="chart-placeholder">
            <p>Peak hours: 5:00 PM - 8:00 PM</p>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>
