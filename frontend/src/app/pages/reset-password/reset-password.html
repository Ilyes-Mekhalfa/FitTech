<div class="container">
    <div class="header">
        <h1>Reset Password</h1>
    </div>
    <div class="form" [formGroup]="PasswordForm">
        <div class="input-group">
            <label>New Password</label>
            <input type="password" placeholder="Enter new password" [formControl]="password" />
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm new password" [formControl]="confirmPassword" />
        </div>
        <button (click)="resetPassword()">Reset Password</button>
    </div>
</div>
